<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krosynd // Shadow-Chat V3</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --neon-blue: #00f2ff; --stark-black: #0a0a0a; --gray: #151515; --hazard: #ff3333; }
        body { background: var(--stark-black); color: var(--neon-blue); font-family: 'Consolas', monospace; margin: 0; overflow: hidden; }
        
        #header { 
            border-bottom: 1px solid var(--neon-blue); 
            padding: 8px 15px; 
            font-size: 0.8rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        #purge-btn {
            background: none;
            border: 1px solid var(--hazard);
            color: var(--hazard);
            padding: 2px 10px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        #purge-btn:hover { background: var(--hazard); color: #000; }
        
        #chat-box { height: calc(100vh - 100px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; font-size: 0.95rem; border-left: 1px solid #333; padding-left: 12px; }
        .user { font-weight: bold; color: #777; font-size: 0.85em; margin-right: 8px; text-transform: uppercase; }
        
        #input-area { position: fixed; bottom: 0; width: 100%; background: var(--gray); display: flex; border-top: 1px solid #333; }
        #username { width: 80px; border: none; border-right: 1px solid #333; background: #000; color: #fff; padding: 15px; text-align: center; outline: none; }
        #message { flex-grow: 1; background: none; border: none; color: var(--neon-blue); padding: 15px 20px; outline: none; }
    </style>
</head>
<body>

<div id="header">
    <span>TJ-XINETIC // SECURE NODE</span>
    <button id="purge-btn" onclick="triggerPurge()">[ Purge ]</button>
</div>

<div id="chat-box"></div>

<div id="input-area">
    <input type="text" id="username" placeholder="ID" maxlength="8">
    <input type="text" id="message" placeholder="Type command..." autocomplete="off">
</div>

<script>
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const sector = gun.get('krosynd_shadow_sector_01');

    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('message');
    const userInput = document.getElementById('username');

    // Display Logic
    sector.map().on((data, id) => {
        if (!data) { 
            location.reload(); // Refresh if data is nullified (purged)
            return; 
        }
        // Only show messages from the last 4 hours
        if (data.time > (Date.now() - 14400000)) {
            const existing = document.getElementById(id);
            if (!existing) {
                const div = document.createElement('div');
                div.id = id;
                div.classList.add('msg');
                div.innerHTML = `<span class="user">${data.user}</span> ${data.body}`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    });

    // Input Logic
    msgInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && msgInput.value && userInput.value) {
            sector.set({
                user: userInput.value,
                body: msgInput.value,
                time: Date.now()
            });
            msgInput.value = '';
        }
    });

    // Purge Protocol
    function triggerPurge() {
        const pass = prompt("CONFIRM AUTHORIZATION CODE:");
        if (pass === "purge123") {
            sector.put(null); // Nullifies the entire sector node
            alert("SECTOR PURGED. TERMINAL RESETTING.");
            chatBox.innerHTML = '';
        } else {
            console.warn("UNAUTHORIZED ACCESS DETECTED.");
        }
    }
</script>
</body>
</html>
