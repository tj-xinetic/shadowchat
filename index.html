<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krosynd // Shadow-Chat V2</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --neon-blue: #00f2ff; --stark-black: #0a0a0a; --gray: #151515; --text-dim: #777; }
        body { background: var(--stark-black); color: var(--neon-blue); font-family: 'Consolas', monospace; margin: 0; overflow: hidden; }
        
        #header { border-bottom: 1px solid var(--neon-blue); padding: 8px 15px; font-size: 0.8rem; letter-spacing: 3px; opacity: 0.7; }
        
        #chat-box { height: calc(100vh - 100px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; scroll-behavior: smooth; }
        
        .msg { margin-bottom: 8px; font-size: 0.95rem; border-left: 1px solid #333; padding-left: 12px; transition: 0.3s; }
        .msg:hover { border-left: 1px solid var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .user { font-weight: bold; color: var(--text-dim); font-size: 0.85em; margin-right: 8px; text-transform: uppercase; }
        
        #input-area { position: fixed; bottom: 0; width: 100%; background: var(--gray); display: flex; border-top: 1px solid #333; }
        
        /* Compact Username Column */
        #username { 
            width: 100px; 
            border: none; 
            border-right: 1px solid #333;
            background: #000;
            color: #fff;
            padding: 15px;
            text-align: center;
            outline: none;
            font-size: 0.8rem;
        }

        /* Expanded Message Area */
        #message { 
            flex-grow: 1; 
            background: none; 
            border: none; 
            color: var(--neon-blue); 
            padding: 15px 20px; 
            outline: none; 
            font-size: 1rem;
        }

        #username:focus, #message:focus { background: rgba(0, 242, 255, 0.02); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); }
    </style>
</head>
<body>

<div id="header">TJ-XINETIC // SECURE NODE // EPHEMERAL STATE</div>
<div id="chat-box"></div>

<div id="input-area">
    <input type="text" id="username" placeholder="ID" maxlength="8">
    <input type="text" id="message" placeholder="Type command or message..." autocomplete="off">
</div>

<script>
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const chat = gun.get('krosynd_shadow_sector_01');

    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('message');
    const userInput = document.getElementById('username');

    // Volatile Protocol: 4-hour window
    const EXPIRY_MS = 4 * 60 * 60 * 1000; 

    msgInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && msgInput.value && userInput.value) {
            chat.set({
                user: userInput.value,
                body: msgInput.value,
                time: Date.now()
            });
            msgInput.value = '';
        }
    });

    chat.map().once((data, id) => {
        if (data && data.time > (Date.now() - EXPIRY_MS)) {
            const div = document.createElement('div');
            div.classList.add('msg');
            div.innerHTML = `<span class="user">${data.user}</span> ${data.body}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    });
</script>
</body>
</html>
