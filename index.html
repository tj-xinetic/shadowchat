<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krosynd // Shadow-Chat V4</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --neon-blue: #00f2ff; --stark-black: #0a0a0a; --gray: #151515; --hazard: #ff3333; }
        
        * { box-sizing: border-box; }
        body, html { 
            background: var(--stark-black); 
            color: var(--neon-blue); 
            font-family: 'Consolas', monospace; 
            margin: 0; 
            height: 100%; 
            overflow: hidden; 
            position: fixed; /* Prevents bounce scroll on iOS */
            width: 100%;
        }

        #main-container {
            display: flex;
            flex-direction: column;
            height: 100%; /* Dynamic height via JS */
        }
        
        #header { 
            border-bottom: 1px solid var(--neon-blue); 
            padding: 10px 15px; 
            font-size: 0.7rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            flex-shrink: 0;
        }

        #chat-box { 
            flex-grow: 1;
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; /* Normal flow, but we will auto-scroll */
            gap: 8px;
        }

        .msg { font-size: 0.9rem; border-left: 2px solid #222; padding-left: 10px; line-height: 1.4; }
        .callsign-tag { font-weight: bold; color: #777; font-size: 0.8em; text-transform: uppercase; }
        
        #input-area { 
            background: var(--gray); 
            display: flex; 
            border-top: 1px solid #333;
            flex-shrink: 0;
        }
        
        #callsign { 
            width: 80px; 
            border: none; 
            border-right: 1px solid #333; 
            background: #000; 
            color: #fff; 
            padding: 15px 5px; 
            text-align: center; 
            outline: none;
            font-size: 0.7rem;
        }

        #message { 
            flex-grow: 1; 
            background: none; 
            border: none; 
            color: var(--neon-blue); 
            padding: 15px; 
            outline: none;
            font-size: 16px; /* Prevents iOS zoom-on-focus */
        }

        #purge-btn { background: none; border: 1px solid var(--hazard); color: var(--hazard); padding: 4px 8px; font-size: 0.6rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="header">
        <span>TJ-XINETIC // MOBILE-SYNC_V4</span>
        <button id="purge-btn" onclick="triggerPurge()">[ Purge ]</button>
    </div>

    <div id="chat-box"></div>

    <div id="input-area">
        <input type="text" id="callsign" placeholder="CALL" maxlength="8">
        <input type="text" id="message" placeholder="Signal..." autocomplete="off">
    </div>
</div>

<script>
    // Multiple Relay Nodes for better Sync across different networks/devices
    const gun = Gun([
        'https://gun-manhattan.herokuapp.com/gun',
        'https://gun-test.herokuapp.com/gun',
        'https://peer.wall.org/gun'
    ]);
    
    const sector = gun.get('krosynd_shadow_sector_01');
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('message');
    const callsignInput = document.getElementById('callsign');

    // MOBILE KEYBOARD FIX: Adjust container height dynamically
    function updateHeight() {
        document.getElementById('main-container').style.height = window.innerHeight + 'px';
        window.scrollTo(0, 0);
    }
    window.addEventListener('resize', updateHeight);
    updateHeight();

    // Data Listener
    sector.map().on((data, id) => {
        if (!data) { location.reload(); return; }
        if (data.time > (Date.now() - 14400000)) {
            if (!document.getElementById(id)) {
                const div = document.createElement('div');
                div.id = id;
                div.className = 'msg';
                div.innerHTML = `<span class="callsign-tag">[${data.user}]</span> ${data.body}`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    });

    // Send Logic
    msgInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && msgInput.value && callsignInput.value) {
            sector.set({
                user: callsignInput.value,
                body: msgInput.value,
                time: Date.now()
            });
            msgInput.value = '';
            // Force scroll to bottom for mobile
            setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 100);
        }
    });

    function triggerPurge() {
        if (prompt("CONFIRM PURGE CODE:") === "purge123") {
            sector.put(null);
            alert("SCRUBBED.");
        }
    }
</script>
</body>
</html>
