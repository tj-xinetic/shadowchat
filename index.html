<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krosynd // Shadow-Chat V5</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --neon-blue: #00f2ff; --stark-black: #0a0a0a; --gray: #151515; --hazard: #ff3333; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            background: var(--stark-black); 
            color: var(--neon-blue); 
            font-family: 'Consolas', monospace; 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent body scroll */
        }

        /* The Main Viewport Wrapper */
        #viewport-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #header { 
            border-bottom: 1px solid var(--neon-blue); 
            padding: 10px; 
            font-size: 0.7rem; 
            display: flex; 
            justify-content: space-between; 
            background: var(--stark-black);
            z-index: 10;
        }

        /* Bottom-Up Chat Box */
        #chat-box { 
            flex: 1;
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column-reverse; /* NEW: Messages start from bottom */
            gap: 12px;
            background: linear-gradient(to bottom, transparent 90%, rgba(0, 242, 255, 0.05));
        }

        .msg { 
            font-size: 0.95rem; 
            border-left: 2px solid var(--neon-blue); 
            padding: 4px 12px; 
            background: rgba(255,255,255,0.02);
            width: fit-content;
            max-width: 90%;
        }

        .callsign-tag { font-weight: bold; color: #555; font-size: 0.75em; display: block; margin-bottom: 2px; }
        
        /* Floating Input Area */
        #input-area { 
            background: var(--gray); 
            display: flex; 
            border-top: 1px solid #333;
            width: 100%;
            padding-bottom: env(safe-area-inset-bottom); /* iOS Notch support */
        }
        
        #callsign { 
            width: 70px; 
            border: none; 
            border-right: 1px solid #333; 
            background: #000; 
            color: #fff; 
            padding: 15px 5px; 
            text-align: center; 
            outline: none;
            font-size: 0.7rem;
        }

        #message { 
            flex-grow: 1; 
            background: none; 
            border: none; 
            color: var(--neon-blue); 
            padding: 15px; 
            outline: none;
            font-size: 16px; /* Essential for mobile focus */
        }

        #purge-btn { background: none; border: 1px solid var(--hazard); color: var(--hazard); padding: 4px; font-size: 0.6rem; }
    </style>
</head>
<body>

<div id="viewport-container">
    <div id="header">
        <span>TJ-XINETIC // FLOATING_NODE_V5</span>
        <button id="purge-btn" onclick="triggerPurge()">[ SCRUB ]</button>
    </div>

    <div id="chat-box" id="chat-stream">
        </div>

    <div id="input-area">
        <input type="text" id="callsign" placeholder="CS" maxlength="6">
        <input type="text" id="message" placeholder="Awaiting Signal..." autocomplete="off">
    </div>
</div>

<script>
    const gun = Gun([
        'https://gun-manhattan.herokuapp.com/gun',
        'https://peer.wall.org/gun'
    ]);
    
    const sector = gun.get('krosynd_shadow_sector_01');
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('message');
    const callsignInput = document.getElementById('callsign');
    const container = document.getElementById('viewport-container');

    // TACTICAL MOBILE FIX: Visual Viewport Tracking
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            container.style.height = window.visualViewport.height + 'px';
            container.style.top = window.visualViewport.offsetTop + 'px';
            window.scrollTo(0, 0);
        });
    }

    // Sync Logic
    sector.map().on((data, id) => {
        if (!data) { location.reload(); return; }
        if (data.time > (Date.now() - 14400000)) {
            if (!document.getElementById(id)) {
                const div = document.createElement('div');
                div.id = id;
                div.className = 'msg';
                div.innerHTML = `<span class="callsign-tag">${data.user}</span>${data.body}`;
                // prepend because of column-reverse
                chatBox.prepend(div); 
            }
        }
    });

    msgInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && msgInput.value && callsignInput.value) {
            sector.set({
                user: callsignInput.value,
                body: msgInput.value,
                time: Date.now()
            });
            msgInput.value = '';
        }
    });

    function triggerPurge() {
        if (prompt("CONFIRM PURGE:") === "purge123") sector.put(null);
    }
</script>
</body>
</html>
